<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation RAG Chatbot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <aside class="sidebar">
          <h1>Conversation RAG</h1>
          <div id="stats" class="stats"></div>
          <div class="quick">
            <button data-query="What kind of person is this user?">Person</button>
            <button data-query="What are their habits?">Habits</button>
            <button data-query="How do they talk?">Style</button>
          </div>
          <h2>Persona JSON</h2>
          <pre id="persona"></pre>
        </aside>
        <section class="chat">
          <div id="messages" class="messages"></div>
          <form id="form" class="composer">
            <input id="query" name="query" placeholder="Ask about the user or conversations" autocomplete="off" />
            <button type="submit">Ask</button>
          </form>
        </section>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
